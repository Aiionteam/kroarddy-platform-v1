server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    relaxed-query-chars: "|,{,},[,]"
    relaxed-path-chars: "|,{,},[,]"

spring:
  application:
    name: tour-site
  main:
    web-application-type: servlet  # servlet 모드 – SseEmitter / JPA / OAuth 컨트롤러와 공존
  threads:
    virtual:
      enabled: true  # 가상 스레드(Project Loom) – 게이트웨이 I/O 처리량 향상
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          # ── Festival 서비스 (8002) ───────────────────────────────────────
          - id: festival
            uri: ${AI_SERVICE_FESTIVAL_URL:http://festival:8002}
            predicates:
              - Path=/api/v1/festivals,/api/v1/festivals/**
            filters:
              - RemoveResponseHeader=Access-Control-Allow-Origin
              - RemoveResponseHeader=Access-Control-Allow-Methods
              - RemoveResponseHeader=Access-Control-Allow-Headers
              - RemoveResponseHeader=Access-Control-Allow-Credentials
              - RemoveResponseHeader=Access-Control-Expose-Headers
              - RemoveResponseHeader=Access-Control-Max-Age

          # ── Planer 서비스 (8003) – Standard / User-Content / K-Content / Weather
          - id: planer
            uri: ${AI_SERVICE_TOURPLANER_URL:http://planer:8003}
            predicates:
              - Path=/api/v1/planner/**,/api/v1/user-content/**,/api/v1/k-content/**,/api/v1/weather,/api/v1/weather/**
            filters:
              - RemoveResponseHeader=Access-Control-Allow-Origin
              - RemoveResponseHeader=Access-Control-Allow-Methods
              - RemoveResponseHeader=Access-Control-Allow-Headers
              - RemoveResponseHeader=Access-Control-Allow-Credentials
              - RemoveResponseHeader=Access-Control-Expose-Headers
              - RemoveResponseHeader=Access-Control-Max-Age

          # ── User-Info 서비스 (8004) ──────────────────────────────────────
          - id: user-info
            uri: ${AI_SERVICE_USER_INFO_URL:http://user_info:8004}
            predicates:
              - Path=/api/v1/user-profile,/api/v1/user-profile/**
            filters:
              - RemoveResponseHeader=Access-Control-Allow-Origin
              - RemoveResponseHeader=Access-Control-Allow-Methods
              - RemoveResponseHeader=Access-Control-Allow-Headers
              - RemoveResponseHeader=Access-Control-Allow-Credentials
              - RemoveResponseHeader=Access-Control-Expose-Headers
              - RemoveResponseHeader=Access-Control-Max-Age
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 15000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        # PostgreSQLDialect는 자동 감지되므로 명시 불필요
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  data:
    redis:
      # Upstash 등 클라우드 Redis: rediss:// URL 사용 (TLS 자동)
      url: ${UPSTASH_REDIS_URL:}
      # URL이 없을 때만 host/port/password 사용 (로컬 Redis 등)
      host: ${UPSTASH_REDIS_HOST:localhost}
      port: ${UPSTASH_REDIS_PORT:6379}
      password: ${UPSTASH_REDIS_PASSWORD:}
      ssl:
        enabled: ${UPSTASH_REDIS_SSL:true}
  # Spring Cloud 제거 - 단순 Spring Boot 애플리케이션으로 실행
  # 내부 서비스(oauth, user, diary)는 같은 애플리케이션 내에서 직접 컨트롤러로 실행됨
  # Spring Security OAuth2 Client 자동 설정 비활성화 (기존 수동 OAuth 구현 사용)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# JWT 설정
jwt:
  secret: ${JWT_SECRET:default-secret-key-change-in-production}
  access-token-expiration: 3600000  # 1시간
  refresh-token-expiration: 2592000000  # 30일

# OAuth 설정
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:}

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
  redirect-uri: ${NAVER_REDIRECT_URI:}

kakao:
  client-id: ${KAKAO_REST_API_KEY:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:}

# AI 서비스 URL – spring.cloud.gateway.mvc.routes 에서 참조
# MSA 구조 (루트 docker-compose.yaml 기준 서비스명):
#   festival  → http://festival:8002
#   planer    → http://planer:8003
#   user_info → http://user_info:8004
# 로컬 직접 실행 시: http://localhost:PORT
ai:
  service:
    festival:
      url: ${AI_SERVICE_FESTIVAL_URL:http://festival:8002}
    tourplaner:
      url: ${AI_SERVICE_TOURPLANER_URL:http://planer:8003}
    user-info:
      url: ${AI_SERVICE_USER_INFO_URL:http://user_info:8004}
    tourstar:
      url: ${AI_SERVICE_TOURSTAR_URL:http://tourstar:8010}

logging:
  level:
    root: INFO
    org.springframework: INFO
    site.aiion.api: INFO

# SpringDoc OpenAPI (Swagger) 설정
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /docs
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  use-management-port: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  packages-to-scan: site.aiion.api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  # Spring Cloud Gateway 제거로 gateway endpoint 불필요
  # endpoint:
  #   gateway:
  #     access: unrestricted
