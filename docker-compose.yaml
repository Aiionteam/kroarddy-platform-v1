# TourStar MSA - 통합 Docker Compose
# 포트 구성:
#   gateway   → 8080 (Spring Boot / 인증·프록시)
#   festival  → 8002 (FastAPI / 전국문화축제표준데이터)
#   planer    → 8003 (FastAPI / AI 여행 루트·일정·날씨)
#   user_info → 8004 (FastAPI / 개인화 프로필)
#
# 사용법:
#   docker compose up -d --build
#   docker compose up -d --build gateway   (게이트웨이만 재빌드)

services:

  # ── Spring Boot Gateway (인증 + 프록시) ───────────────────────────────────
  gateway:
    build:
      context: ./api.tourstory.site
      dockerfile: gateway/Dockerfile
    image: tour-site-gateway:latest
    container_name: tour-site-gateway
    env_file:
      - ./api.tourstory.site/.env
    environment:
      SPRING_PROFILES_ACTIVE: local
      # Docker 내부 네트워크 서비스명으로 라우팅
      AI_SERVICE_FESTIVAL_URL: http://festival:8002
      AI_SERVICE_TOURPLANER_URL: http://planer:8003
      AI_SERVICE_USER_INFO_URL: http://user_info:8004
    ports:
      - "8080:8080"
    depends_on:
      - festival
      - planer
      - user_info
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - tourstar-net

  # ── Festival API (전국문화축제표준데이터, 포트 8002) ──────────────────────
  festival:
    build:
      context: ./festival.tourstory.site
      dockerfile: Dockerfile
    image: tour-site-festival:latest
    container_name: tour-site-festival
    env_file:
      - ./festival.tourstory.site/.env
    ports:
      - "8002:8002"
    restart: unless-stopped
    networks:
      - tourstar-net

  # ── Tour Planner API (AI 여행 루트·일정, 포트 8003) ──────────────────────
  planer:
    build:
      context: ./planer.tourstory.site
      dockerfile: Dockerfile
    image: tour-site-planer:latest
    container_name: tour-site-planer
    env_file:
      - ./planer.tourstory.site/.env
    environment:
      # Docker 내부 네트워크 서비스명으로 서비스간 통신
      FESTIVAL_SERVICE_URL: http://festival:8002
      USER_INFO_SERVICE_URL: http://user_info:8004
    ports:
      - "8003:8003"
    depends_on:
      - festival
      - user_info
    restart: unless-stopped
    networks:
      - tourstar-net

  # ── User Info Service (개인화 프로필, 포트 8004) ──────────────────────────
  user_info:
    build:
      context: ./user_info.tourstory.site
      dockerfile: Dockerfile
    image: tour-site-user-info:latest
    container_name: tour-site-user-info
    env_file:
      - ./user_info.tourstory.site/.env
    ports:
      - "8004:8004"
    restart: unless-stopped
    networks:
      - tourstar-net

networks:
  tourstar-net:
    driver: bridge
