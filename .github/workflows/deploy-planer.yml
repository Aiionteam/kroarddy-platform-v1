# CI/CD: GitHub Actions → Docker Hub (Planer Service)
# EC2 배포 없음. EC2에서 직접 pull & run.
#
# 모노레포: backend/planer.kroaddy.site/ 변경 시에만 실행

name: Build & Push Planer to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'backend/planer.kroaddy.site/**'
      - '.github/workflows/deploy-planer.yml'
  workflow_dispatch:

env:
  DOCKER_IMAGE: necromancer1234/planer.kroaddy.site
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/planer.kroaddy.site
          file: ./backend/planer.kroaddy.site/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
