# CI/CD: GitHub Actions → Docker Hub only (API Gateway)
# EC2 배포 없음. EC2에서 직접: docker pull && docker run (또는 cron으로 자동화)

name: Build & Push API Gateway to Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'backend/api.kroaddy.site/**'
      - '.github/workflows/deploy-api-gateway.yml'
  workflow_dispatch:

env:
  CONTEXT_PATH: backend/api.kroaddy.site
  DOCKERFILE_PATH: backend/api.kroaddy.site/gateway/Dockerfile
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/api.kroaddy.site
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
